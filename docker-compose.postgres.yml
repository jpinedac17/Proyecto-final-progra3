services:
  postgres:
    image: postgres:16
    container_name: territorial-tree-postgres

    environment:
      POSTGRES_DB: territorial_tree_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d territorial_tree_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: territorial-tree-app

    ports:
      - "8081:8081"

    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/territorial_tree_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: